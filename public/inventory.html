<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar material-card">
      <div class="topbar-content">
        <div>
          <p class="eyebrow">Inventory Management</p>
          <h1>Dashboard</h1>
        </div>
        <nav class="page-nav" aria-label="Primary">
          <a href="/app" class="nav-link nav-link-active">Inventory</a>
          <a href="/admin" id="admin-nav-link" class="nav-link hidden">Admin</a>
        </nav>
      </div>
      <div class="topbar-actions">
        <div>
          <p id="current-user" class="user-name"></p>
          <p id="current-role" class="user-role"></p>
        </div>
        <button id="logout-btn" class="btn btn-secondary">
          <span class="material-symbols-outlined">logout</span>
          Logout
        </button>
      </div>
    </header>

    <main class="page-shell container stack-xl">
      <section class="summary-grid section" id="summary-grid"></section>

      <section class="material-card section card-spacing stack-lg">
        <div class="section-header">
          <div>
            <h2>Inventory</h2>
            <p class="subtitle">Search by item name and manage your inventory items.</p>
          </div>
          <button id="add-item-btn" class="btn btn-primary hidden">
            <span class="material-symbols-outlined">add_circle</span>
            Add Item
          </button>
        </div>

        <div id="inventory-message" class="alert hidden" role="alert"></div>

        <div class="toolbar section">
          <label class="input-group compact form-group search-group">
            <span>Search by item name</span>
            <input type="search" id="search-input" placeholder="Enter an item name" />
          </label>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Category</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Status</th>
                <th id="actions-header" class="hidden">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-table-body"></tbody>
          </table>
        </div>

        <div class="pagination-bar">
          <button id="prev-page" class="btn btn-secondary">Previous</button>
          <p id="pagination-text"></p>
          <button id="next-page" class="btn btn-secondary">Next</button>
        </div>
      </section>
    </main>

    <dialog id="item-dialog" class="dialog-card">
      <form id="item-form" class="stack-lg">
        <div class="section-header">
          <h2 id="dialog-title">Add item</h2>
          <button type="button" id="close-dialog" class="icon-btn" aria-label="Close dialog">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div id="form-message" class="alert hidden" role="alert"></div>

        <input type="hidden" id="item-id" />

        <div class="form-grid">
          <label class="input-group">
            <span>Item</span>
            <select id="item-master" required></select>
          </label>

          <label class="input-group">
            <span>Category</span>
            <select id="category-master" required></select>
          </label>

          <label class="input-group">
            <span>Quantity</span>
            <input type="number" id="item-quantity" min="0" step="1" required />
          </label>

          <label class="input-group">
            <span>Price</span>
            <input type="number" id="item-price" min="0" step="0.01" required />
          </label>

          <label class="input-group">
            <span>Status</span>
            <select id="item-status" required>
              <option value="in stock">In stock</option>
              <option value="low stock">Low stock</option>
              <option value="out of stock">Out of stock</option>
            </select>
          </label>
        </div>

        <div class="dialog-actions">
          <button type="button" id="cancel-dialog" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <script src="/js/inventory.js"></script>
  </body>
</html>
